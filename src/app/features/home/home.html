<app-balance [transactions]="transactions()"></app-balance>

<div class="actions">
    <a matButton="filled" routerLink="create">Adicionar Receita </a>
</div>

<div class="transactions">
@for ( item of transactions() ; track item) {
    <app-transations-item class = "transaction" [transation]="item" (edit)="edit($event)"> </app-transations-item>
} @empty {
    <app-no-transactions></app-no-transactions>

}
</div>
