<mat-card class="card">
<div>
    <div class="card-title">
        {{transation().title}}
    </div>

    <div class="card-value">
        <app-transaction-value [transaction]="transation()"></app-transaction-value>
    </div>
</div>

<div class="card-actions">
     <button matFab (click)="edit.emit(transation())">
     <mat-icon>create</mat-icon>
    </button>

    <button matFab >
     <mat-icon>delete</mat-icon>
    </button>

</div>


</mat-card>
